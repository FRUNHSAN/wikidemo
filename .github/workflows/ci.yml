name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ==========================================
  # 1. 代码质量检查
  # ==========================================
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black pylint
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Lint with flake8
      run: |
        # 停止构建如果有语法错误或未定义的名称
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # 退出代码非零时警告
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check code formatting with black
      run: |
        black --check . || echo "Code formatting issues found"
    
    - name: Lint with pylint
      run: |
        pylint --disable=C0114,C0115,C0116 --exit-zero scripts/ config-manager/ log-manager/ plugins/ || true

  # ==========================================
  # 2. Docker Compose 配置验证
  # ==========================================
  validate-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Validate docker-compose.yml
      run: |
        docker compose config --quiet
        echo "✅ Docker Compose configuration is valid"
    
    - name: Check for security issues
      run: |
        # 检查是否有硬编码的密码或密钥
        if grep -r "password.*=" docker-compose.yml | grep -v "\${"; then
          echo "❌ Found hardcoded passwords in docker-compose.yml"
          exit 1
        fi
        echo "✅ No hardcoded secrets found"

  # ==========================================
  # 3. 插件测试
  # ==========================================
  test-plugins:
    name: Test Plugins
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run plugin tests
      run: |
        # 如果存在测试文件则运行
        if [ -d "tests" ]; then
          pytest tests/ -v --cov=. --cov-report=xml
        else
          echo "No tests found, skipping..."
        fi
    
    - name: Validate plugin registry
      run: |
        python -c "import json; json.load(open('plugins/registry.json'))"
        echo "✅ Plugin registry is valid JSON"
    
    - name: Check plugin structure
      run: |
        # 检查每个插件是否有必要的文件
        for plugin_dir in plugins/*/; do
          if [ -f "$plugin_dir/plugin.json" ]; then
            echo "✅ $plugin_dir has plugin.json"
          else
            echo "⚠️  $plugin_dir missing plugin.json"
          fi
        done

  # ==========================================
  # 4. 集成测试准备
  # ==========================================
  prepare-test:
    name: Prepare Test Environment
    runs-on: ubuntu-latest
    needs: [lint, validate-compose]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Cache Docker layers
      uses: actions/cache@v3
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-
    
    - name: Pull base images
      run: |
        docker compose pull db wiki nginx || true
        echo "✅ Base images pulled"
    
    - name: Build custom plugin images
      run: |
        # 构建C语言插件镜像（如果有Dockerfile）
        if [ -f "plugins/markdown-optimizer/Dockerfile" ]; then
          docker build -t wikidemotongyi/plugin-markdown-optimizer:latest \
            -f plugins/markdown-optimizer/Dockerfile \
            plugins/markdown-optimizer
          echo "✅ Plugin image built"
        else
          echo "⚠️ No plugin Dockerfile found, skipping"
        fi
    
    - name: Move cache
      run: |
        rm -rf /tmp/.buildx-cache
        mv /tmp/.buildx-cache-new /tmp/.buildx-cache 2>/dev/null || true

  # ==========================================
  # 5. 集成测试
  # ==========================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [prepare-test]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Start core services
      run: |
        docker compose up -d db wiki nginx
        echo "Waiting for services to start..."
        sleep 30
    
    - name: Check service health
      run: |
        docker compose ps
        echo "--- DB Logs ---"
        docker compose logs --tail=20 db
        echo "--- Wiki Logs ---"
        docker compose logs --tail=20 wiki
    
    - name: Test Wiki.js accessibility
      run: |
        # 等待Wiki.js完全启动
        for i in {1..30}; do
          if curl -s http://localhost:80 > /dev/null 2>&1 || curl -s http://localhost:3000 > /dev/null 2>&1; then
            echo "✅ Wiki.js is accessible"
            exit 0
          fi
          echo "Waiting for Wiki.js... ($i/30)"
          sleep 5
        done
        echo "❌ Wiki.js failed to start"
        docker compose logs wiki
        exit 1
    
    - name: Start plugin services
      run: |
        docker compose --profile plugins up -d markdown-optimizer
        echo "⏳ Waiting for plugin to become healthy..."
        
        # 使用Docker健康检查状态等待服务就绪
        for i in {1..30}; do
          HEALTH_STATUS=$(docker inspect --format='{{.State.Health.Status}}' wiki-plugin-markdown-optimizer 2>/dev/null || echo "not_found")
          
          if [ "$HEALTH_STATUS" = "healthy" ]; then
            echo "✅ Plugin is healthy!"
            exit 0
          elif [ "$HEALTH_STATUS" = "unhealthy" ]; then
            echo "❌ Plugin became unhealthy"
            docker compose logs --tail=30 markdown-optimizer
            exit 1
          fi
          
          echo "  Status: $HEALTH_STATUS (attempt $i/30)"
          sleep 3
        done
        
        echo "❌ Plugin failed to become healthy within timeout"
        docker compose logs --tail=50 markdown-optimizer
        docker inspect wiki-plugin-markdown-optimizer --format='{{json .State.Health}}' | python3 -m json.tool
        exit 1
    
    - name: Test plugin API endpoints
      run: |
        echo "🔍 Testing plugin API endpoints..."
        
        # 首先检查端口是否监听
        echo "Checking if port 8081 is accessible..."
        for i in {1..5}; do
          if curl -s --connect-timeout 2 http://localhost:8081/health > /dev/null 2>&1; then
            echo "✅ Port 8081 is accessible"
            break
          fi
          echo "  Waiting for port to be ready... ($i/5)"
          sleep 2
        done
        
        # 验证健康检查端点返回正确的JSON
        echo "Fetching health check response..."
        RESPONSE=$(curl -s --max-time 5 http://localhost:8081/health 2>&1) || {
          echo "❌ Failed to connect to plugin service"
          echo "Debug info:"
          echo "- Docker container status:"
          docker compose ps markdown-optimizer
          echo "- Container logs (last 20 lines):"
          docker compose logs --tail=20 markdown-optimizer
          echo "- Port mapping:"
          docker port wiki-plugin-markdown-optimizer 2>/dev/null || echo "Cannot get port info"
          exit 1
        }
        
        echo "Health check response: $RESPONSE"
        
        # 验证响应包含expected字段
        if echo "$RESPONSE" | grep -q '"status"'; then
          echo "✅ Health check endpoint returns valid JSON"
        else
          echo "❌ Invalid health check response"
          echo "Expected JSON with 'status' field, got: $RESPONSE"
          exit 1
        fi
        
        # 测试其他API端点（可选）
        echo "✅ All plugin endpoints verified"
    
    - name: Stop services
      if: always()
      run: docker compose down -v

  # ==========================================
  # 6. 发布Docker镜像（仅tag）
  # ==========================================
  publish:
    name: Publish Docker Images
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ${{ env.DOCKER_REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata for plugin
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.DOCKER_REGISTRY }}/wikidemotongyi/plugin-markdown-optimizer
        tags: |
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha
    
    - name: Build and push plugin image
      if: hashFiles('plugins/markdown-optimizer/Dockerfile') != ''
      uses: docker/build-push-action@v4
      with:
        context: ./plugins/markdown-optimizer
        file: ./plugins/markdown-optimizer/Dockerfile
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ==========================================
  # 7. 创建GitHub Release
  # ==========================================
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [publish]
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Generate changelog
      run: |
        echo "## Changes" > CHANGELOG_RELEASE.md
        git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %s" >> CHANGELOG_RELEASE.md || true
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        body_path: CHANGELOG_RELEASE.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
