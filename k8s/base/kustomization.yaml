apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wiki-system

resources:
  - namespace.yaml
  - postgresql.yaml
  - wiki.yaml
  - nginx.yaml
  - plugin-manager.yaml
  - config-manager.yaml
  - services.yaml
  - ingress.yaml

configMapGenerator:
  - name: wiki-config
    literals:
      - DB_TYPE=postgres
      - DB_PORT=5432
      - TZ=Asia/Shanghai

secretGenerator:
  - name: wiki-secrets
    literals:
      - POSTGRES_PASSWORD=wikipassword123
      - WIKI_API_TOKEN=changeme

generatorOptions:
  disableNameSuffixHash: true
