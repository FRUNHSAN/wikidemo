apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: wiki-system
  labels:
    app.kubernetes.io/name: postgresql
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    name: postgresql
  selector:
    app.kubernetes.io/name: postgresql
---
apiVersion: v1
kind: Service
metadata:
  name: wiki
  namespace: wiki-system
  labels:
    app.kubernetes.io/name: wiki
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  selector:
    app.kubernetes.io/name: wiki
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: wiki-system
  labels:
    app.kubernetes.io/name: nginx
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
    name: http
  - port: 443
    targetPort: 443
    name: https
  selector:
    app.kubernetes.io/name: nginx
---
apiVersion: v1
kind: Service
metadata:
  name: config-manager
  namespace: wiki-system
  labels:
    app.kubernetes.io/name: config-manager
spec:
  type: ClusterIP
  ports:
  - port: 5000
    targetPort: 5000
    name: http
  selector:
    app.kubernetes.io/name: config-manager
